<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-con" href="https://img.icons8.com/emoji/1200/books-emoji.jpg">
    <title>Afazeres Projeto</title>
</head>

<body>
    <div id="container">
        <h1 id="titulo">30-03-26</h1>

        <div id="lista-tarefas" style="box-shadow: none; padding: 0; max-width: 100%;"></div>

        <div class="input-group" style="margin-top: 20px; box-shadow: none; padding: 0;">
            <input type="text" id="nova-atividade" placeholder="Nova atividade..."
                style="padding: 8px; border-radius: 4px; border: 1px solid #ddd; width: 70%;">
            <button id="btn-adicionar"
                style="padding: 8px 12px; background: var(--primary-color); color: white; border: none; border-radius: 4px; cursor: pointer;">+</button>
        </div>
        <p style="font-size: 0.8rem; color: #888; margin-top: 15px;">💡 Dica: Dois cliques para excluir.</p>
    </div>
    <script src="script.js"></script>
</body>

</html>
